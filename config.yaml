archive:
  root: '/Volumes/My Passport/ARCHIVE/Photos'

workspace:
  path: "./workspace"

files:
  jpegExtensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".bmp"

  rawExtensions:
    - ".cr2"
    - ".cr3"
    - ".crw"
    - ".rw2"
    - ".dng"
    - ".nef"
    - ".arw"
    - ".tif"
    - ".tiff"
    - ".mov"
    - ".mp4"

duplicates:
  trashDir: ".photo-cleaner-trash/duplicates"

orientation:
  enabled: true

  trustedCameraModels:
    - "Canon EOS 5D Mark II"
    - "Canon EOS 450D"
    - "NIKON D90"
    - "NIKON D800"

  excludedPathPrefixes:
    - '/Volumes/My Passport/ARCHIVE/Photos/astro/'

  neverRotateExtensions:
    - ".cr2"
    - ".cr3"
    - ".crw"
    - ".rw2"
    - ".dng"
    - ".raw"
    - ".nef"
    - ".arw"
    - ".tif"
    - ".tiff"
    - ".mov"
    - ".mp4"

  candidateExtensions:
    - ".jpg"
    - ".jpeg"
    - ".png"

  allowedRotations:
    - 90
    - 270

  ml:
    datasetCameraModel: "Canon EOS 450D"
    datasetRoot: "./workspace/orientation_dataset"
    checkpointPath: "./workspace/models/orientation_efficientnet_b0.pt"
    metricsPath: "./workspace/models/orientation_metrics.json"
    randomSeed: 42
    trainRatio: 0.7
    valRatio: 0.15
    imageSize: 224
    jpegQuality: 92
    batchSize: 16
    epochs: 15
    learningRate: 0.0001
    device: "mps"
    numWorkers: 0
    verbose: true
    logEveryBatches: 5
    confidenceThreshold: 0.95
    marginThreshold: 0.25

thumbnails:
  enabled: true
  maxSide: 256
  quality: 75