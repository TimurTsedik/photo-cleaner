archive:
  root: '/Volumes/My Passport/ARCHIVE/Photos/photo base/2005/05/'

workspace:
  path: "./workspace_test"

files:
  jpegExtensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".bmp"

  rawExtensions:
    - ".cr2"
    - ".cr3"
    - ".crw"
    - ".dng"
    - ".nef"
    - ".arw"
    - ".tif"
    - ".tiff"
    - ".mov"
    - ".mp4"

duplicates:
  trashDir: ".photo-cleaner-trash/duplicates"

orientation:
  enabled: true

  trustedCameraModels:
    - "Canon EOS 5D Mark II"

  neverRotateExtensions:
    - ".cr2"
    - ".cr3"
    - ".crw"
    - ".dng"
    - ".raw"
    - ".nef"
    - ".arw"
    - ".tif"
    - ".tiff"
    - ".mov"
    - ".mp4"

  candidateExtensions:
    - ".jpg"
    - ".jpeg"
    - ".png"

  allowedRotations:
    - 90
    - 270

  openrouter:
    model: "baidu/qianfan-ocr-fast:free"
    endpoint: "https://openrouter.ai/api/v1/chat/completions"
    apiKey: "YOUR_OPENROUTER_API_KEY"
    timeoutSeconds: 120
    maxRateLimitWaitSeconds: 15
    maxRateLimitRetries: 1
    debugDumpEnabled: true
    debugDumpDir: "./workspace_test/debug"
    minConfidence: 0.85
    maxImageSide: 448
    comparePanelSide: 128
    jpegQuality: 65

  ml:
    datasetCameraModel: "Canon EOS 5D Mark II"
    datasetRoot: "./workspace_test/orientation_dataset"
    checkpointPath: "./workspace_test/models/orientation_efficientnet_b0.pt"
    metricsPath: "./workspace_test/models/orientation_metrics.json"
    randomSeed: 42
    trainRatio: 0.7
    valRatio: 0.15
    imageSize: 224
    jpegQuality: 92
    batchSize: 8
    epochs: 1
    learningRate: 0.0001
    device: "cpu"
    numWorkers: 0
    confidenceThreshold: 0.95
    marginThreshold: 0.25

thumbnails:
  enabled: true
  maxSide: 256
  quality: 75